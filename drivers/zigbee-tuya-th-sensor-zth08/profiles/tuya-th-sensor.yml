name: tuya-th-sensor
components:
- id: main
  capabilities:
  - id: temperatureMeasurement
    version: 1
  - id: relativeHumidityMeasurement
    version: 1
  - id: battery
    version: 1
  - id: refresh
    version: 1
  categories:
  - name: MultiFunctionalSensor
preferences:
  - name: "utcOffset"
    title: "Clock UTC offset (hours)"
    description: "Timezone offset from UTC used to set the on-device clock (e.g. 1 for Lisbon summer time)."
    required: false
    preferenceType: integer
    definition:
      minimum: -12
      maximum: 14
      default: 1
